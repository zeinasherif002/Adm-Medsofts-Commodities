name: Daily Corn Forecast
on:
  schedule:
    - cron: '0 20 * * 1-5'  # Every weekday at 11 PM Cairo (8 PM UTC) — after CBOT closes
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas openpyxl scikit-learn yfinance requests xgboost
      - name: Run forecast
        run: python run_forecast.py
