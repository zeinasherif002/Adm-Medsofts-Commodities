name: Daily Corn Forecast
on:
  schedule:
    - cron: '30 13,14,15,16,17,18,19 * * 1-5'  # Every 30min 3:30-9:30 PM Cairo (UTC+3 = UTC 13-19)
    - cron: '0 20 * * 1-5'                        # Final run 11 PM Cairo after close
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas openpyxl scikit-learn yfinance requests xgboost statsmodels
      - name: Run forecast
        run: python run_forecast.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
